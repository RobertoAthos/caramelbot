services:
  caramelbot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./skills:/app/skills
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/caramelbot.db
    depends_on:
      - playwright
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright/mcp:latest
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  db-data:
